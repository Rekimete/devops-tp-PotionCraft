apiVersion: apps/v1
kind: Deployment
metadata:
  name: potioncraft-frontend
  namespace: potioncraft
  labels:
    app: potioncraft-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: potioncraft-frontend
  template:
    metadata:
      labels:
        app: potioncraft-frontend
    spec:
      containers:
        - name: frontend
          image: docker.io/rekimete/potioncraft-frontend:latest
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5


