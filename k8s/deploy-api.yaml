apiVersion: apps/v1
kind: Deployment
metadata:
  name: potioncraft-api
  namespace: potioncraft
  labels:
    app: potioncraft-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: potioncraft-api
  template:
    metadata:
      labels:
        app: potioncraft-api
    spec:
      containers:
        - name: api
          image: docker.io/rekimete/potioncraft-api:latest
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /potions
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /potions
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5


